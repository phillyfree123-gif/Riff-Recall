function log(msg,cls){
  var el=document.getElementById("log");
  el.style.display="block";
  el.innerHTML+="<div class="+(cls||"")+">" + msg + "</div>";
  el.scrollTop=el.scrollHeight;
}

async function run(){
  var cid=document.getElementById("cid").value.trim();
  var csec=document.getElementById("csec").value.trim();
  if(!cid||!csec){alert("Enter credentials");return;}
  document.getElementById("go").disabled=true;
  document.getElementById("log").innerHTML="";
  document.getElementById("dl").style.display="none";
  r1Final=[];r2Final=[];

  log("Getting Spotify token...","inf");
  var token;
  try{
    var tr=await fetch("https://accounts.spotify.com/api/token",{
      method:"POST",
      headers:{Authorization:"Basic "+btoa(cid+":"+csec),"Content-Type":"application/x-www-form-urlencoded"},
      body:"grant_type=client_credentials"
    });
    if(!tr.ok) throw new Error("HTTP "+tr.status+" — check credentials and try again");
    token=(await tr.json()).access_token;
    log("Token OK","ok");
  }catch(e){
    log("Token failed: "+e.message,"no");
    document.getElementById("go").disabled=false;
    return;
  }

  log("Fetching audio previews...","inf");
  for(var i=0;i<SONGS.length;i++){
    var s=SONGS[i];
    var preview="";

    // 1. Try Deezer via CORS proxy (fetched NOW in setup, baked into game file)
    try{
      var deezerUrl="https://api.deezer.com/search?q="+encodeURIComponent(s[2]+" "+s[3])+"&limit=5";
      var proxyUrl="https://proxy.corsfix.com/?"+deezerUrl;
      var dr=await fetch(proxyUrl);
      var dd=await dr.json();
      var dtracks=dd.data||[];
      for(var dt=0;dt<dtracks.length;dt++){if(dtracks[dt].preview){preview=dtracks[dt].preview;break;}}
    }catch(e){}

    // 2. Try Spotify
    if(!preview){
      try{
        var sr=await fetch("https://api.spotify.com/v1/search?q="+encodeURIComponent(s[2]+" "+s[3])+"&type=track&limit=8",{headers:{Authorization:"Bearer "+token}});
        var sd=await sr.json();
        var tracks=(sd.tracks&&sd.tracks.items)||[];
        for(var t=0;t<tracks.length;t++){if(tracks[t].preview_url){preview=tracks[t].preview_url;break;}}
      }catch(e){}
    }

    // 3. iTunes hardcoded fallback
    if(!preview&&ITUNES_FALLBACK[s[2]]){preview=ITUNES_FALLBACK[s[2]];}

    log((preview?"OK ✓":"MISS")+" "+s[2]+" — "+s[3],preview?"ok":"no");
    var proxyPreview=preview?"https://proxy.corsfix.com/?"+preview:"";
    r1Final.push({decade:s[0],hint:s[1],song:s[2]+" — "+s[3],preview:proxyPreview,answers:s[4],correct:s[5]});
    await new Promise(function(r){setTimeout(r,200);});
  }

  log("Fetching artist photos from Wikipedia...","inf");
  for(var i=0;i<ARTISTS.length;i++){
    var a=ARTISTS[i];
    var img="";
    try{
      var wr=await fetch("https://en.wikipedia.org/w/api.php?action=query&titles="+a[1]+"&prop=pageimages&format=json&pithumbsize=500&origin=*");
      var wd=await wr.json();
      var pages=wd.query&&wd.query.pages||{};
      var pg=Object.values(pages)[0];
      if(pg&&pg.thumbnail&&pg.thumbnail.source){img=pg.thumbnail.source;log("OK "+a[1].replace(/_/g," ").replace(/%C3%A9/g,"e"),"ok");}
      else{log("-- "+a[1].replace(/_/g," ")+" (no image)","no");}
    }catch(e){log("ERR "+a[1],"no");}
    r2Final.push({hint:a[0],img:img,answers:a[2],correct:a[3]});
    await new Promise(function(r){setTimeout(r,100);});
  }

  log("All done! Click Download below.","inf");
  document.getElementById("dl").style.display="block";
  document.getElementById("go").disabled=false;
}

function q(s){
  // safely quote a string for use inside single-quoted JS
  return s.replace(/\\/g,"\\\\").replace(/'/g,"\\'");
}

function dl(){
  var r1lines=r1Final.map(function(s){
    return "{decade:'"+q(s.decade)+"',hint:'"+q(s.hint)+"',song:'"+q(s.song)+"',preview_url:'"+s.preview+"',answers:['"+s.answers.map(q).join("','")+"'],correct:"+s.correct+"}";
  });
  var r2lines=r2Final.map(function(s){
    return "{hint:'"+q(s.hint)+"',img:'"+s.img+"',answers:['"+s.answers.map(q).join("','")+"'],correct:"+s.correct+"}";
  });
  var r3lines=R3.map(function(s){
    return "{clue:'"+q(s[0])+"',song:'"+q(s[1])+"',answers:['"+s[2].map(q).join("','")+"'],correct:"+s[3]+"}";
  });

  var out=GAME_TEMPLATE
    .replace("/*R1*/",r1lines.join(",\n"))
    .replace("/*R2*/",r2lines.join(",\n"))
    .replace("/*R3*/",r3lines.join(",\n"));

  var blob=new Blob([out],{type:"text/html"});
  var a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download="riff-and-recall.html";
  a.click();
}

'.code-input:focus{border-color:var(--gold);}',
'.code-input::placeholder{color:#333;font-size:28px;letter-spacing:4px;}',
'.name-input{background:var(--surf);border:1px solid var(--border);border-radius:8px;padding:14px 16px;color:var(--text);font-size:18px;width:100%;max-width:280px;text-align:center;outline:none;transition:border-color .15s;}',

'.err{font-size:13px;color:var(--red);min-height:18px;}',
'#pwaiting{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;}',

'.p-clbl{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:5px;}',
'.p-chint{font-size:15px;font-weight:500;margin-bottom:8px;}',
'.mbars{display:flex;align-items:flex-end;justify-content:center;gap:3px;height:24px;margin:6px auto 0;}',
'.mbar{width:4px;background:var(--gold);border-radius:2px;animation:bounce 1s ease infinite;}',
'.mbar:nth-child(2){animation-delay:.15s;}',

'.mbar:nth-child(4){animation-delay:.45s;}',

'',

'<script>',
'"use strict";',
'var ABLY_KEY="Ug5YfA.d_CijQ:fH7cgOykNFEkY_4ZNfQNgcJ7F7tSjYiW15J43NfLVTM";',
'var COLORS=["#F5C842","#4CAF50","#E8334A","#5B9CF6","#C97BE8","#FF8C42","#5DCAA5","#ED93B1"];',
'var LTRS=["A","B","C","D"];',
'',
'var R1_POOL=[',
'/*R1*/',
'];',
'var R2_POOL=[',
'/*R2*/',
'];',
'var R3_POOL=[',
'/*R3*/',
'];',
'',
'function $(i){return document.getElementById(i);}',
'function show(i){$(i).classList.remove("hidden");}',
'function hide(i){$(i).classList.add("hidden");}',
'function shuffle(a){return[].concat(a).sort(function(){return Math.random()-.5;});}',
'function pick(a,n){return shuffle(a).slice(0,n);}',
'function genCode(){return String(Math.floor(1000+Math.random()*9000));}',
'',
'function setStatus(s,t){show("sbar");$("sdot").className="sdot "+s;$("stxt").textContent=t;}',
'function copyLink(){navigator.clipboard.writeText("https://phillyfree123-gif.github.io/Riff-Recall/").then(function(){$("copy-btn").textContent="Copied!";$("copy-btn").style.background="var(--green)";setTimeout(function(){$("copy-btn").textContent="Copy";$("copy-btn").style.background="var(--gold)";},2000);});}',,
'',
'var ch=null;',
'function connectAbly(room,cb){',
'  setStatus("wait","Connecting...");',
'  var s=document.createElement("script");',
'  s.src="https://cdn.ably.com/lib/ably.min-2.js";',
'  s.onerror=function(){setStatus("err","Could not load Ably");};',
'  s.onload=function(){',
'    var client=new Ably.Realtime({key:ABLY_KEY,clientId:"u"+Math.random().toString(36).slice(2)});',
'    client.connection.on("connected",function(){setStatus("ok","Connected \xb7 room "+room);ch=client.channels.get("rr8-"+room);cb();});',
'    client.connection.on("disconnected",function(){setStatus("err","Disconnected...");});',
'    client.connection.on("failed",function(){setStatus("err","Connection failed");});',
'  };',
'  document.head.appendChild(s);',
'}',
'function pub(e,d){if(ch)ch.publish(e,d);}',
'function sub(e,fn){if(ch)ch.subscribe(e,function(m){fn(m.data);});}',
'',
'function unlockAudio(){',
'  try{var ctx=new(window.AudioContext||window.webkitAudioContext)();var b=ctx.createBuffer(1,1,22050);var s=ctx.createBufferSource();s.buffer=b;s.connect(ctx.destination);s.start(0);}catch(e){}',
'}',
'',
'function startHost(){unlockAudio();hide("landing");show("host");initHost();}',
'function startPlayer(){hide("landing");show("player");initPlayer();}',
'',
'var roomCode="",hPlayers={},hRounds=[],hRound=0,hCurrent=0;',
'var hAnswered=false,hTimerID=null,hTimeLeft=15,hAudio=null,hPlaying=false,hFirst=null;',
'',
'function curQ(){return hRounds[hRound].questions[hCurrent];}',
'function curType(){return hRounds[hRound].type;}',
'function totalQ(){return hRounds[hRound].questions.length;}',
'',
'function initHost(){',
'  if(roomCode)return;',
'  roomCode=genCode();',
'  $("room-code-num").textContent=roomCode;',
'  /* URL and QR are hardcoded to https://phillyfree123-gif.github.io/Riff-Recall/ */',
'  connectAbly(roomCode,function(){',
'    $("conn-status").textContent="Ready! Waiting for players...";',
'    $("conn-status").style.color="var(--green)";',
'    sub("join",function(d){',
'      if(hPlayers[d.id]){pub("joined",{id:d.id,color:hPlayers[d.id].color});return;}',
'      var idx=Object.keys(hPlayers).length;',
'      hPlayers[d.id]={name:d.name,color:COLORS[idx%COLORS.length],score:0,streak:0,maxStreak:0,choice:-1,buzzed:false};',
'      renderLobby();',
'      pub("joined",{id:d.id,color:hPlayers[d.id].color});',
'      var n=Object.keys(hPlayers).length;',
'      $("start-btn").disabled=false;',
'      $("start-btn").textContent="Start Game \u2014 "+n+" player"+(n!==1?"s":"");',
'    });',
'    sub("answer",function(d){',
'      if(hAnswered)return;',
'      var p=hPlayers[d.id];if(!p||p.buzzed)return;',
'      p.buzzed=true;p.choice=d.choice;',
'      var q=curQ(),correct=d.choice===q.correct;',
'      if(correct){',
'        var pts=(curType()==="r1")?(10+(hTimeLeft>10?5:hTimeLeft>5?2:0)):1;',
'        if(hFirst===null){hFirst=d.id;if(curType()!=="r1")pts+=1;}',
'        p.score+=pts;p.streak++;p.maxStreak=Math.max(p.maxStreak,p.streak);',
'      }else{p.streak=0;}',
'      renderScoreCards();',
'      var allIn=Object.values(hPlayers).every(function(p){return p.buzzed;});',
'      if(allIn){clearInterval(hTimerID);revealHost();}',
'    });',
'  });',
'}',
'',
'function renderLobby(){',
'  var list=$("player-list");list.innerHTML="";',
'  Object.values(hPlayers).forEach(function(p){',
'    var c=document.createElement("div");c.className="player-chip";',
'    c.innerHTML=\'<div class="dot" style="background:\'+p.color+\'"></div><span class="chip-name">\'+p.name+\'</span><span class="chip-badge">Ready</span>\';',
'    list.appendChild(c);',
'  });',
'}',
'',
'function hostStart(){',
'  unlockAudio();',
'  hRounds=[',
'    {type:"r1",questions:pick(R1_POOL,Math.min(30,R1_POOL.length))},',
'    {type:"r2",questions:pick(R2_POOL,Math.min(25,R2_POOL.length))},',
'    {type:"r3",questions:pick(R3_POOL,Math.min(25,R3_POOL.length))}',
'  ];',
'  hRound=0;hCurrent=0;',
'  Object.values(hPlayers).forEach(function(p){p.score=0;p.streak=0;p.maxStreak=0;});',
'  hide("lobby");show("hgame");',
'  broadcastRound();renderHostQ();',
'}',
'',
'function broadcastRound(){',
'  var r=hRounds[hRound];',
'  pub("round-start",{round:hRound,type:r.type,qs:r.questions.map(function(q,i){return{i:i,answers:q.answers,correct:q.correct,hint:q.hint||"",clue:q.clue||"",song:q.song||"",img:q.img||""};})});',
'}',
'',
'function renderHostQ(){',
'  hAnswered=false;hFirst=null;',
'  clearInterval(hTimerID);',
'  if(hAudio){try{hAudio.pause();}catch(e){}}hAudio=null;hPlaying=false;',
'  Object.values(hPlayers).forEach(function(p){p.buzzed=false;p.choice=-1;});',
'  var q=curQ(),type=curType(),total=totalQ();',
'  var sec=type==="r1"?15:40;',
'  hTimeLeft=sec;',
'  var rtitles=["Round 1 \u2014 Audio Clips","Round 2 \u2014 Who Is This?","Round 3 \u2014 Lyric Clues"];',
'  var rdescs=["Listen and guess the artist","Spot the musician from the photo","Guess the song from the clue"];',
'  $("h-rpill").textContent="R"+(hRound+1);',
'  $("h-rtitle").textContent=rtitles[hRound];',
'  $("h-rdesc").textContent=rdescs[hRound];',
'  $("q-ctr").textContent="Q "+(hCurrent+1)+" / "+total;',
'  $("dec-tag").textContent=q.decade||q.hint||"";',
'  $("prog-bar").style.width=Math.round((hCurrent/total)*100)+"%";',
'  $("feedback").textContent="";$("feedback").className="feedback";',
'  hide("next-btn");hide("song-txt");hide("reveal-btn");',
'  hide("r1-content");hide("r2-content");hide("r3-content");',
'  if(type==="r1"){',
'    show("r1-content");',
'    $("h-hint").textContent=q.hint||"";',
'    $("h-bar").style.width="0%";',
'    $("h-play-ic").classList.remove("hidden");$("h-pause-ic").classList.add("hidden");',
'    if(q.preview_url){',
'      hAudio=new Audio(q.preview_url);',
'      hAudio.ontimeupdate=function(){if(hAudio.duration){$("h-bar").style.width=Math.min((hAudio.currentTime/hAudio.duration)*100,100)+"%"; if(hAudio.currentTime>=5&&!hAnswered){hAudio.pause();hPlaying=false;$("h-play-ic").classList.remove("hidden");$("h-pause-ic").classList.add("hidden");}}};',
'      hAudio.onended=function(){hPlaying=false;$("h-play-ic").classList.remove("hidden");$("h-pause-ic").classList.add("hidden");};',
'      hAudio.play().then(function(){hPlaying=true;$("h-play-ic").classList.add("hidden");$("h-pause-ic").classList.remove("hidden");}).catch(function(e){$("h-hint").textContent=(q.hint||"")+" \u2190 tap play";});',
'    }',
'  }else if(type==="r2"){',
'    show("r2-content");',
'    var img=$("h-aimg");img.className="artist-img";',
'    img.onerror=function(){img.style.display="none";};',
'    img.src=q.img||"";',
'    $("h-r2hint").textContent=q.hint||"";',
'  }else{',
'    show("r3-content");',
'    $("r3-content").textContent=q.clue||"";',
'  }',
'  var ag=$("ans-grid");ag.innerHTML="";',
'  q.answers.forEach(function(a,i){',
'    var d=document.createElement("div");d.className="ans-chip";d.id="ac"+i;',
'    d.innerHTML=\'<span class="ltr">\'+LTRS[i]+\'</span>\'+a;',
'    ag.appendChild(d);',
'  });',
'  renderScoreCards();',
'  startTimer(sec);',
'  pub("question",{index:hCurrent,round:hRound,type:type,hint:q.hint||"",clue:q.clue||"",img:q.img||""});',
'}',
'',
'function togglePlay(){',
'  if(!hAudio)return;',
'  if(hPlaying){hAudio.pause();hPlaying=false;$("h-play-ic").classList.remove("hidden");$("h-pause-ic").classList.add("hidden");}',
'  else{hAudio.play().then(function(){hPlaying=true;$("h-play-ic").classList.add("hidden");$("h-pause-ic").classList.remove("hidden");}).catch(function(){});}',
'}',
'',
'function startTimer(sec){',
'  updateRing(sec,sec);',
'  hTimerID=setInterval(function(){hTimeLeft--;updateRing(hTimeLeft,sec);if(hTimeLeft<=0){clearInterval(hTimerID);revealHost();}},1000);',
'}',
'',
'function updateRing(v,max){',
'  var off=163.36-(v/max)*163.36;',
'  $("t-circle").style.strokeDashoffset=off;$("t-num").textContent=v;',
'  var hot=v<=5;$("t-circle").classList.toggle("hot",hot);$("t-num").classList.toggle("hot",hot);',
'}',
'',
'function revealAnswer(){',
'  var q=curQ(),type=curType();',
'  if(type==="r2")$("h-aimg").className="artist-img";',
'  var label=type==="r3"?"Song: "+q.song+" \u00b7 Artist: "+q.answers[q.correct]:"Song: "+q.song;',
'  $("song-txt").innerHTML="<strong>"+label+"</strong>";',
'  show("song-txt");hide("reveal-btn");',
'  if(type==="r1"&&q.preview_url){',
'    if(hAudio){try{hAudio.pause();}catch(e){}}',
'    hAudio=new Audio(q.preview_url);',
'    hAudio.ontimeupdate=function(){if(hAudio.duration)$("h-bar").style.width=Math.min((hAudio.currentTime/hAudio.duration)*100,100)+"%";};',
'    hAudio.onended=function(){hPlaying=false;$("h-play-ic").classList.remove("hidden");$("h-pause-ic").classList.add("hidden");};',
'    hAudio.play().then(function(){hPlaying=true;$("h-play-ic").classList.add("hidden");$("h-pause-ic").classList.remove("hidden");}).catch(function(){});',
'  }',
'}',
'',
'function revealHost(){',
'  hAnswered=true;',
'  if(hAudio){try{hAudio.pause();}catch(e){}}',
'  var q=curQ();',
'  q.answers.forEach(function(_,i){$("ac"+i).classList.add(i===q.correct?"cc":"cw");});',
'  var winners=Object.values(hPlayers).filter(function(p){return p.choice===q.correct;}).map(function(p){return p.name;});',
'  var fp=hFirst&&hPlayers[hFirst];',
'  var fb=$("feedback");',
'  if(!winners.length){fb.textContent="Nobody got it!";fb.classList.add("bad");}',
'  else{fb.textContent=winners.join(", ")+" got it!"+(fp&&curType()!=="r1"?" "+fp.name+" was first! (+1 bonus)":"");fb.classList.add("good");}',
'  renderScoreCards();',
'  var isLQ=hCurrent>=totalQ()-1,isLR=hRound>=hRounds.length-1;',
'  $("next-btn").textContent=isLQ?(isLR?"See Results":"Round Summary"):"Next Question";',
'  show("next-btn");show("reveal-btn");',
'  pub("reveal",{correct:q.correct,song:q.song||"",firstId:hFirst,scores:scoreP()});',
'}',
'',
'function scoreP(){var o={};Object.entries(hPlayers).forEach(function(kv){o[kv[0]]={score:kv[1].score,streak:kv[1].streak};});return o;}',
'',
'function renderScoreCards(){',
'  var row=$("score-row");row.innerHTML="";',
'  var q=hRounds[hRound]&&hRounds[hRound].questions[hCurrent];',
'  Object.entries(hPlayers).sort(function(a,b){return b[1].score-a[1].score;}).forEach(function(kv){',
'    var id=kv[0],p=kv[1];',
'    var isF=id===hFirst&&p.buzzed&&p.choice===(q&&q.correct);',
'    var c=document.createElement("div");',
'    c.className="score-card"+(p.buzzed?(p.choice===(q&&q.correct)?(isF?" sc-first":" sc-ok"):" sc-no"):"");',
'    c.innerHTML=\'<div style="display:flex;align-items:center;gap:7px;margin-bottom:4px;"><div class="dot" style="background:\'+p.color+\'"></div><div class="sc-name">\'+p.name+(isF?\'<span class="fbadge">First!</span>\':"")+\'</div></div><div class="sc-pts">\'+p.score+\'</div><div class="sc-st \'+(p.buzzed?"sc-l":"sc-w")+\'">\'+( p.buzzed?"answered":"waiting...")+\'</div>\';',
'    row.appendChild(c);',
'  });',
'}',
'',
'function hostNext(){',
'  if(hCurrent<totalQ()-1){hCurrent++;renderHostQ();}',
'  else if(hRound<hRounds.length-1){showBetween();}',
'  else{hostEnd();}',
'}',
'',
'function showBetween(){',
'  hide("hgame");show("hbetween");',
'  var nn=["Round 2: Who Is This?","Round 3: Lyric Clues"];',
'  $("bt-title").textContent="Round "+(hRound+1)+" Complete!";',
'  $("bt-sub").textContent="Up next \u2014 "+nn[hRound];',
'  var bs=$("bs-wrap");bs.innerHTML="";',
'  Object.values(hPlayers).sort(function(a,b){return b.score-a.score;}).forEach(function(p){',
'    var c=document.createElement("div");c.className="bs-card";',
'    c.innerHTML=\'<div class="dot" style="background:\'+p.color+\';margin:0 auto 6px;width:10px;height:10px;border-radius:50%;"></div><div class="bs-name">\'+p.name+\'</div><div class="bs-pts">\'+p.score+\'</div>\';',
'    bs.appendChild(c);',
'  });',
'  pub("between-rounds",{round:hRound,scores:scoreP()});',
'}',
'',
'function hostContinue(){hRound++;hCurrent=0;hide("hbetween");show("hgame");broadcastRound();renderHostQ();}',
'',
'function hostEnd(){',
'  pub("game-end",{scores:scoreP()});',
'  hide("hgame");show("hend");',
'  var sorted=Object.values(hPlayers).sort(function(a,b){return b.score-a.score;});',
'  var pod=$("podium");pod.innerHTML="";',
'  var defs=[{cls:"p1",rk:"p-rank gold",lb:"1ST"},{cls:"p2",rk:"p-rank",lb:"2ND"},{cls:"p3",rk:"p-rank",lb:"3RD"}];',
'  sorted.forEach(function(p,i){',
'    var d=defs[i]||{cls:"",rk:"p-rank",lb:(i+1)+"TH"};',
'    var c=document.createElement("div");c.className="podium-card "+d.cls;',
'    c.innerHTML=\'<div class="\'+d.rk+\'">\'+d.lb+\'</div><div class="dot" style="background:\'+p.color+\';margin:0 auto 8px;width:12px;height:12px;"></div><div class="p-name">\'+p.name+\'</div><div class="p-pts">\'+p.score+\'</div><div style="font-size:11px;color:var(--muted);margin-top:4px;">best streak \'+p.maxStreak+\'</div>\';',
'    pod.appendChild(c);',
'  });',
'}',
'',
'var pID="u"+Math.random().toString(36).slice(2,10);',
'var pName="",pColor=COLORS[0],pScore=0,pRound=0,pRType="r1",pQs=[],pCur=0,pBuzzed=false,pChoice=-1;',
'',
'function initPlayer(){',
'  var jp=new URLSearchParams(location.search).get("join");',
'  if(jp)$("code-inp").value=jp;',
'  $("code-inp").addEventListener("keydown",function(e){if(e.key==="Enter")$("pname").focus();});',
'  $("pname").addEventListener("keydown",function(e){if(e.key==="Enter")playerJoin();});',
'}',
'',
'function playerJoin(){',
'  var code=$("code-inp").value.trim();',
'  pName=$("pname").value.trim();',
'  var err=$("perr");',
'  if(code.length!==4||!/^\\d+$/.test(code)){err.textContent="Enter the 4-digit code on the TV.";return;}',
'  if(!pName){err.textContent="Enter your name!";return;}',
'  err.textContent="";',
'  connectAbly(code,function(){',
'    sub("joined",function(d){if(d.id!==pID)return;pColor=d.color;$("p-av").style.background=pColor;$("p-av").textContent=pName.slice(0,2).toUpperCase();});',
'    sub("round-start",function(d){',
'      pRound=d.round;pRType=d.type;pQs=d.qs;pCur=0;',
'      hide("pwaiting");hide("pbetween");show("pgame");',
'      $("p-dname").textContent=pName;$("p-av").textContent=pName.slice(0,2).toUpperCase();$("p-av").style.background=pColor;',
'      $("p-rbadge").textContent="Round "+(pRound+1);',
'    });',
'    sub("question",function(d){pCur=d.index;pBuzzed=false;pChoice=-1;renderPQ(d);});',
'    sub("reveal",function(d){',
'      document.querySelectorAll(".p-ans").forEach(function(b,i){b.disabled=true;b.classList.remove("pa-sel");if(i===d.correct)b.classList.add("pa-rev");else if(i===pChoice)b.classList.add("pa-no");});',
'      hide("p-locked");',
'      if(d.firstId===pID){$("p-ltitle").textContent="First! +1 bonus!";$("p-ltitle").style.color="var(--gold)";show("p-locked");}',
'      if(pRType==="r2"){var im=$("p-extra").querySelector(".p-img");if(im)im.className="p-img clear";}',
'      if(d.scores&&d.scores[pID]){pScore=d.scores[pID].score;$("p-score").textContent=pScore;}',
'    });',
'    sub("between-rounds",function(d){',
'      hide("pgame");show("pbetween");',
'      $("p-bt-title").textContent="Round "+(d.round+1)+" complete!";',
'      if(d.scores&&d.scores[pID]){pScore=d.scores[pID].score;$("p-bt-score").textContent=pScore;}',
'    });',
'    sub("game-end",function(d){playerEnd(d.scores);});',
'    hide("pjoin");show("pwaiting");',
'    $("wait-name").textContent=pName.toUpperCase();',
'    pub("join",{id:pID,name:pName});',
'  });',
'}',
'',
'function renderPQ(d){',
'  var q=pQs[pCur];',
'  $("p-rbadge").textContent="Round "+(pRound+1);',
'  $("p-qind").textContent="Q "+(pCur+1)+" of "+pQs.length;',
'  $("p-ltitle").textContent="Locked in!";$("p-ltitle").style.color="var(--green)";',
'  hide("p-locked");',
'  var ex=$("p-extra");ex.innerHTML="";',
'  if(pRType==="r1"){',
'    $("p-clbl").textContent="Now playing on TV";',
'    $("p-chint").textContent=d.hint||q.hint||"";',
'    ex.innerHTML=\'<div class="mbars"><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div><div class="mbar"></div></div>\';',
'  }else if(pRType==="r2"){',
'    $("p-clbl").textContent="Who is this?";',
'    $("p-chint").textContent=d.hint||q.hint||"";',
'    if(d.img||q.img){var im=document.createElement("img");im.className="p-img";im.src=d.img||q.img;im.alt="mystery artist";im.onerror=function(){im.style.display="none";};ex.appendChild(im);}',
'  }else{',
'    $("p-clbl").textContent="Lyric clue";',
'    $("p-chint").textContent="";',
'    var lc=document.createElement("div");lc.className="p-lyric";lc.textContent=d.clue||q.clue||"";ex.appendChild(lc);',
'  }',
'  var grid=$("p-ans-grid");grid.innerHTML="";',
'  q.answers.forEach(function(a,i){',
'    var b=document.createElement("button");b.className="p-ans";',
'    b.innerHTML=\'<span class="al">\'+LTRS[i]+\'</span>\'+a;',
'    b.onclick=function(){submitA(i);};',
'    grid.appendChild(b);',
'  });',
'}',
'',
'function submitA(idx){',
'  if(pBuzzed)return;pBuzzed=true;pChoice=idx;',
'  document.querySelectorAll(".p-ans").forEach(function(b,i){b.disabled=true;if(i===idx)b.classList.add("pa-sel");});',
'  if(pRType==="r2"){var im=$("p-extra").querySelector(".p-img");if(im)im.className="p-img clear";}',
'  show("p-locked");',
'  pub("answer",{id:pID,choice:idx});',
'}',
'',
'function playerEnd(scores){',
'  hide("pgame");show("pend");',
'  var s=(scores&&scores[pID])?scores[pID].score:pScore;',
'  $("p-final").textContent=s;',
'  var pct=Math.round((s/(30*15+25*2+25*2))*100);',
'  var grade,color;',
'  if(pct>=75){grade="ROCK GOD";color="#F5C842";}',
'  else if(pct>=50){grade="CHART TOPPER";color="#4CAF50";}',
'  else if(pct>=30){grade="B-SIDE HERO";color="#aaa";}',
'  else{grade="BACK TO VINYL";color="#E8334A";}',
'  $("p-grade").textContent=grade;$("p-grade").style.color=color;',
'}',
'<\/script>',
'</body>',
'</html>'
].join("\n");
</script>
</body>
</html>
